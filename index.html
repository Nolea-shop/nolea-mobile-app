    <style>
      /* Custom Nolea Loading Screen */
      #nolea-loader {
        position: fixed;
        inset: 0;
        z-index: 9999;
        background: #FAF9F6;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        transition: opacity 0.5s ease, visibility 0.5s ease;
      }
      #nolea-loader.hidden {
        opacity: 0;
        visibility: hidden;
      }
      .loader-logo {
        font-family: Georgia, 'Times New Roman', serif;
        font-size: 2.5rem;
        font-weight: 700;
        font-style: italic;
        color: #1F1D1A;
        margin-bottom: 2rem;
        letter-spacing: -0.02em;
      }
      .loader-bar {
        width: 120px;
        height: 3px;
        background: #E5E2D9;
        border-radius: 2px;
        overflow: hidden;
        position: relative;
      }
      .loader-bar::after {
        content: '';
        position: absolute;
        top: 0;
        left: -40%;
        width: 40%;
        height: 100%;
        background: linear-gradient(90deg, #8A9A5B, #6B7A46);
        border-radius: 2px;
        animation: loader-slide 1.2s ease-in-out infinite;
      }
      @keyframes loader-slide {
        0% { left: -40%; }
        100% { left: 100%; }
      }
      .loader-dots {
        display: flex;
        gap: 6px;
        margin-top: 1.5rem;
      }
      .loader-dot {
        width: 6px;
        height: 6px;
        background: #8A9A5B;
        border-radius: 50%;
        animation: dot-pulse 1.4s ease-in-out infinite;
      }
      .loader-dot:nth-child(2) { animation-delay: 0.2s; }
      .loader-dot:nth-child(3) { animation-delay: 0.4s; }
      @keyframes dot-pulse {
        0%, 80%, 100% { opacity: 0.3; transform: scale(0.8); }
        40% { opacity: 1; transform: scale(1); }
      }
    </style>
  </head>
